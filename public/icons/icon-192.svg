<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e0a3c"/>
      <stop offset="100%" style="stop-color:#060612"/>
    </linearGradient>
    <linearGradient id="ship" x1="96" y1="30" x2="96" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#b388ff"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="flame" x1="96" y1="130" x2="96" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>
  <!-- 星星装饰 -->
  <circle cx="30" cy="40" r="1.5" fill="#e8d5f5" opacity="0.6"/>
  <circle cx="155" cy="55" r="1" fill="#e8d5f5" opacity="0.4"/>
  <circle cx="45" cy="145" r="1.2" fill="#e8d5f5" opacity="0.5"/>
  <circle cx="160" cy="130" r="1.8" fill="#e8d5f5" opacity="0.3"/>
  <circle cx="70" cy="30" r="0.8" fill="#67e8f9" opacity="0.6"/>
  <circle cx="140" cy="160" r="1" fill="#67e8f9" opacity="0.4"/>
  <!-- 飞船主体 -->
  <path d="M96 30L76 115H116L96 30Z" fill="url(#ship)" stroke="rgba(232,213,245,0.3)" stroke-width="1"/>
  <!-- 飞船窗口 -->
  <circle cx="96" cy="70" r="8" fill="#67e8f9" opacity="0.8"/>
  <circle cx="96" cy="70" r="4" fill="#ffffff" opacity="0.3"/>
  <!-- 左翼 -->
  <path d="M76 115L58 140H82L76 115Z" fill="rgba(109,40,217,0.6)" stroke="rgba(232,213,245,0.2)" stroke-width="0.5"/>
  <!-- 右翼 -->
  <path d="M116 115L134 140H110L116 115Z" fill="rgba(109,40,217,0.6)" stroke="rgba(232,213,245,0.2)" stroke-width="0.5"/>
  <!-- 推进器火焰 -->
  <path d="M86 140L96 165L106 140" fill="url(#flame)"/>
</svg>